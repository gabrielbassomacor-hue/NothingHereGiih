<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva - Impacto</title>
    <style>
        /* Estilos globais com a nova cor de fundo */
        body {
            background-color: rgb(31, 31, 31);
            color: white;
            /* Fonte impactante aplicada a todo o documento */
            font-family: 'Impact', 'Haettenschweiler', 'Arial Narrow Bold', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase; /* Deixa o texto em caixa alta para maior impacto */
        }

        /* Estilo do cronômetro */
        #timer {
            font-size: 8rem; /* Aumentado para destacar a nova fonte */
            font-weight: normal;
            letter-spacing: 8px;
            font-variant-numeric: tabular-nums;
        }

        /* Estilo do texto inferior */
        #subtitle {
            font-size: 1.8rem;
            margin-top: 10px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.8); /* Branco levemente transparente */
        }

        /* Estilo do quadrado clicável com a cor RGB 15, 15, 15 */
        #square-link {
            display: none;
            margin-top: 50px;
            width: 150px;
            height: 150px;
            background-color: rgb(15, 15, 15);
            color: white;
            text-decoration: none;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Borda sutil para destacar do fundo */
            transition: all 0.3s ease;
            cursor: pointer;
        }

        #square-link:hover {
            transform: scale(1.1);
            background-color: rgb(0, 0, 0);
            border-color: white;
        }

        /* Animação para piscar */
        .piscar {
            animation: piscar-animacao 0.8s step-start infinite;
        }

        @keyframes piscar-animacao {
            50% { opacity: 0; }
        }

        /* Ajustes para telas menores */
        @media (max-width: 600px) {
            #timer { font-size: 4rem; }
            #subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="timer">00:00:00</div>
    <div id="subtitle">Quem corre demais… acaba deixando o essencial para trás.</div>

    <a id="square-link" href="https://gabrielmacor.github.io/i-Purple-You---Giih/">Entrar</a>

    <script>
        // Data alvo: 17/04/2026 às 12:00
        const targetDate = new Date("2026-04-17T12:00:00").getTime();

        const timerElement = document.getElementById("timer");
        const squareLink = document.getElementById("square-link");

        const updateTimer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance <= 0) {
                clearInterval(updateTimer);
                timerElement.innerHTML = "00:00:00";
                timerElement.classList.add("piscar");
                squareLink.style.display = "flex";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const format = (num) => num.toString().padStart(2, '0');

            // Exibe dias apenas se houver mais de 24h restantes
            if (days > 0) {
                timerElement.innerHTML = `${format(days)}:${format(hours)}:${format(minutes)}:${format(seconds)}`;
            } else {
                timerElement.innerHTML = `${format(hours)}:${format(minutes)}:${format(seconds)}`;
            }

        }, 1000);
    </script>
</body>
</html>
