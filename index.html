<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva</title>
    <style>
        /* Fundo completamente preto */
        body {
            background-color: #000000;
            /* Cor do texto em RGB 31, 31, 31 */
            color: rgb(31, 31, 31);
            font-family: 'Impact', 'Haettenschweiler', 'Arial Narrow Bold', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Estilo do cronômetro */
        #timer {
            font-size: 8rem;
            font-weight: normal;
            letter-spacing: 8px;
            font-variant-numeric: tabular-nums;
        }

        /* Nova frase com a mesma cor do texto */
        #subtitle {
            font-size: 1.6rem;
            margin-top: 15px;
            letter-spacing: 1px;
            text-align: center;
            padding: 0 20px;
        }

        /* Estilo do quadrado em RGB 15, 15, 15 */
        #square-link {
            display: none;
            margin-top: 50px;
            width: 150px;
            height: 150px;
            background-color: rgb(15, 15, 15);
            /* Texto dentro do quadrado para visibilidade */
            color: rgb(31, 31, 31);
            text-decoration: none;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            border: 1px solid rgb(31, 31, 31);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        #square-link:hover {
            transform: scale(1.05);
            background-color: rgb(31, 31, 31);
            color: #000000;
        }

        /* Animação para piscar o 00:00:00 */
        .piscar {
            animation: piscar-animacao 0.8s step-start infinite;
        }

        @keyframes piscar-animacao {
            50% { opacity: 0; }
        }

        /* Responsividade para celular */
        @media (max-width: 600px) {
            #timer { font-size: 3.5rem; letter-spacing: 4px; }
            #subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="timer">00:00:00</div>
    <div id="subtitle">Quem corre demais… acaba deixando o essencial para trás.</div>

    <a id="square-link" href="https://gabrielmacor.github.io/i-Purple-You---Giih/">Entrar</a>

    <script>
        // Data alvo: 17/04/2026 às 12:00
        const targetDate = new Date("2026-04-17T12:00:00").getTime();

        const timerElement = document.getElementById("timer");
        const squareLink = document.getElementById("square-link");

        const updateTimer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance <= 0) {
                clearInterval(updateTimer);
                timerElement.innerHTML = "00:00:00";
                timerElement.classList.add("piscar");
                squareLink.style.display = "flex";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const format = (num) => num.toString().padStart(2, '0');

            if (days > 0) {
                timerElement.innerHTML = `${format(days)}:${format(hours)}:${format(minutes)}:${format(seconds)}`;
            } else {
                timerElement.innerHTML = `${format(hours)}:${format(minutes)}:${format(seconds)}`;
            }

        }, 1000);
    </script>
</body>
</html>
